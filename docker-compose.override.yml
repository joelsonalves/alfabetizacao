version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - VITE_TTS_LANG=pt-BR
      - VITE_API_PROXY=http://backend:8000
    command: npm run dev -- --host 0.0.0.0 --port 5173
